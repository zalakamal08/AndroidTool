name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install UPX
        run: choco install upx --no-progress -y

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm AndroidTool.spec

      - name: Rename artifact with version tag
        id: rename
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF -match 'refs/tags/(.+)') { $Matches[1] } else { 'dev' }
          $name = "AndroidTool-$tag.exe"
          Rename-Item dist\AndroidTool.exe $name
          echo "artifact_name=$name" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.artifact_name }}
          path: dist/${{ steps.rename.outputs.artifact_name }}
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: AndroidTool ${{ github.ref_name }}
          files: dist/${{ steps.rename.outputs.artifact_name }}
          generate_release_notes: true
